<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="al pasto.">
  <title>al pasto.</title>
  <rect width="180" height="180" fill="#000000"/>
  <!-- white card -->
  <rect x="34" y="30" width="112" height="120" rx="18" fill="#ffffff"/>
  <!-- al pasto. wordmark, stacked -->
  <text x="90" y="82" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-weight="700" font-size="30"
        letter-spacing="-1.8"
        fill="#000000">al</text>
  <text x="90" y="116" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-weight="700" font-size="28"
        letter-spacing="-1.8"
        fill="#000000">pasto.</text>
  <!-- cobalt-violet underscore stamp -->
  <rect x="62" y="128" width="56" height="7" fill="#494fdf"/>
</svg>
